services:
  db:
    image: postgres:16-alpine
    container_name: lemoria-db
    environment:
      POSTGRES_DB: lemoria
      POSTGRES_USER: lemoria
      POSTGRES_PASSWORD: lemoria
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lemoria"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
