version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lemoria
      POSTGRES_USER: lemoria
      POSTGRES_PASSWORD: lemoria
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lemoria"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
